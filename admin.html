<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
</head>

<body>

<h1>🔐 Painel do Administrador</h1>

<div id="login">

<input type="password" id="senhaAdmin" placeholder="Senha admin">
<br><br>
<button onclick="loginAdmin()">Entrar</button>

<p id="erro"></p>

</div>

<div id="painel" style="display:none">

<h2>Dados do Usuário</h2>

<p id="dados"></p>

<button onclick="aprovar()">Aprovar Pagamento</button>
<button onclick="logout()">Sair</button>

</div>

<script>

const senhaCorreta = "Admin@2026"; // MUDE depois

function loginAdmin(){

let senha = document.getElementById("senhaAdmin").value;

if(senha === senhaCorreta){

document.getElementById("login").style.display="none";
document.getElementById("painel").style.display="block";

mostrarDados();

}else{
document.getElementById("erro").innerText="Senha errada";
}

}

function mostrarDados(){

let usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario){
document.getElementById("dados").innerText="Nenhum usuário cadastrado";
return;
}

document.getElementById("dados").innerHTML =
"Nome: " + usuario.nome + "<br>" +
"Email: " + usuario.email + "<br>" +
"Status pagamento: " + usuario.pagamento;

}

function aprovar(){

let usuario = JSON.parse(localStorage.getItem("usuario"));

usuario.pagamento = "aprovado";

localStorage.setItem("usuario", JSON.stringify(usuario));

alert("Pagamento aprovado!");
mostrarDados();

}

function logout(){
location.reload();
}

</script>

</body>
</html>
