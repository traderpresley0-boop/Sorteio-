<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Minha Conta</title>
</head>

<body>

<h1>Minha Conta</h1>

<p id="statusPagamento"></p>

<button onclick="irSorteio()">Participar do Sorteio</button>
<br><br>
<button onclick="sair()">Sair</button>

<script>

if(localStorage.getItem("logado") !== "true"){
window.location.href="index.html";
}

let usuario = JSON.parse(localStorage.getItem("usuario"));

document.getElementById("statusPagamento").innerText =
"Status do pagamento: " + usuario.pagamento;

function irSorteio(){
window.location.href="participar.html";
}

function sair(){
localStorage.removeItem("logado");
window.location.href="index.html";
}

</script>

</body>
</html>
