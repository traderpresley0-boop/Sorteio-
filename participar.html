<!DOCTYPE html>
<html lang="pt">
<head>

<title>Pagamento do Sorteio</title>

</head>

<body>

<div class="container">

<h1>🎉 Participar do Sorteio</h1>

<p>Para participar faça um depósito mínimo de:</p>

<h2>500 Kz</h2>

<hr>

<h3>💳 Dados para Depósito</h3>

<p><b>Banco:</b> Kwik</p>
<p><b>Nome:</b> Zeferino Estevão Borges</p>
<p><b>IBAN:</b> AO06042000000000027091758</p>

<p>Após o pagamento envie o comprovante:</p>

<input type="file" id="comprovante">
<br><br>

<button onclick="enviarComprovante()">Enviar Comprovante</button>

<p id="status"></p>

</div>

<script>

function enviarComprovante(){

let arquivo = document.getElementById("comprovante").files[0];

if(!arquivo){
document.getElementById("status").innerHTML =
"⚠️ Envie o comprovante primeiro";
return;
}

document.getElementById("status").innerHTML =
"✅ Comprovante enviado! Aguarde confirmação do administrador.";

localStorage.setItem("pagamento","pendente");
}

</script>

</body>
